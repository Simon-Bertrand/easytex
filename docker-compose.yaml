version: '3.8'

services:
  easytex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easytex
    ports:
      - "8081:8081"
    volumes:
      # Mount the local projects/examples directory so documents persist and are editable on the host
      - ./example:/app/projects
    environment:
      - PORT=8081
      - EASYTEX_HOST=0.0.0.0
      - ROOT_DIR=/app/projects
      - RUST_LOG=info
      # Set this in production to protect /admin and /api/admin/*.
      # - EASYTEX_ADMIN_TOKEN=change-me
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
