version: '3.8'

services:
  easytex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easytex
    ports:
      - "8081:8081"
    volumes:
      # Mount the local projects/examples directory so documents persist and are editable on the host
      - ./example:/app/projects
    environment:
      - PORT=8081
      - EASYTEX_HOST=0.0.0.0
      - ROOT_DIR=/app/projects
      - RUST_LOG=info
      # Required because the container binds to 0.0.0.0.
      # It protects /api/*, /pdf/*, /events/*, and /admin.
      - EASYTEX_ADMIN_TOKEN=${EASYTEX_ADMIN_TOKEN:?Set EASYTEX_ADMIN_TOKEN before running docker compose}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
