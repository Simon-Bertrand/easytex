name: CI

on:
  push:
  pull_request:

env:
  TECTONIC_VERSION: 0.16.9

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run build
        working-directory: frontend
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - run: cargo build --release --features latexmk

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit
      - run: npm audit --audit-level=moderate
      - run: npm audit --audit-level=moderate
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build executable with Dockerfile.build
        run: docker build -f Dockerfile.build --target artifact -t easytex-builder-test .
      - name: Smoke-test Docker-built executable
        run: docker run --rm easytex-builder-test version --json
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - name: Build release binary for runtime image context
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run build
          cd ..
          cargo build --release
      - name: Build runtime image
        run: docker build -f Dockerfile -t easytex-runtime-test .
      - name: Smoke-test runtime image
        run: docker run --rm easytex-runtime-test version --json

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update
      - run: sudo apt-get install -y pkg-config libfontconfig1-dev libssl-dev
      - run: cargo install tectonic --version "$TECTONIC_VERSION" --locked
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run build
        working-directory: frontend
      - run: bunx playwright install --with-deps chromium
      - run: bun run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  e2e-auth:
    runs-on: ubuntu-latest
    env:
      EASYTEX_E2E_ADMIN_TOKEN: ci-token
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update
      - run: sudo apt-get install -y pkg-config libfontconfig1-dev libssl-dev
      - run: cargo install tectonic --version "$TECTONIC_VERSION" --locked
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run build
        working-directory: frontend
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test tests/admin-auth.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-auth-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
